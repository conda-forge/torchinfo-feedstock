{% set name = "torchinfo" %}
{% set version = "1.8.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 72e94b0e9a3e64dc583a8e5b7940b8938a1ac0f033f795457f27e6f4e7afa2e9

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - pytorch >=1.6

test:
  imports:
    - torchinfo
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tyleryep/torchinfo
  summary: Model summary in PyTorch, based off of the original torchsummary.
  license: MIT
  license_file: LICENSE
  doc_url: https://github.com/TylerYep/torchinfo#documentation

extra:
  recipe-maintainers:
    - TylerYep
    - sarthakpati
